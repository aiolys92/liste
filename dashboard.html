<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Post — Dashboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a030">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ---- DASHBOARD ---- */
    .dash-kpi-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) { .dash-kpi-row { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 500px) { .dash-kpi-row { grid-template-columns: repeat(2,1fr); } }

    .dash-kpi {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      text-align: center;
      transition: border-color 0.2s, transform 0.15s;
    }
    .dash-kpi:hover { border-color: var(--border-strong); transform: translateY(-2px); }

    .dash-kpi-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--text-bright);
      line-height: 1;
      margin-bottom: 6px;
    }
    .dash-kpi-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    .dash-charts-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 900px) { .dash-charts-row { grid-template-columns: 1fr; } }

    .dash-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .dash-card::before {
      content: '';
      position: absolute; inset: 0 0 auto 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
    }
    .dash-card-wide { margin-bottom: 0; }

    .dash-card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* Donut */
    .dash-donut-wrap { display: flex; align-items: center; gap: 16px; }
    .dash-legend { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .dash-legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-base); }
    .dash-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dash-legend-key { flex: 1; }
    .dash-legend-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }

    /* Barres */
    .dash-bars { display: flex; flex-direction: column; gap: 8px; }
    .dash-bar-row { display: flex; align-items: center; gap: 8px; }
    .dash-bar-label { font-size: 11px; color: var(--text-base); width: 80px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dash-bar-track { flex: 1; height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }
    .dash-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .dash-bar-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); width: 24px; text-align: right; flex-shrink: 0; }

    /* Timeline */
    .dash-timeline-legend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    .dash-empty { color: var(--text-faint); font-size: 12px; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="header-title"><span class="header-title-icon">⬡</span>Command Post</a>
    <nav class="header-nav">
      <a href="index.html">Mission Board</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="changelog.html">Changelog</a>
      <a href="requests.html">Demandes</a>
      <a href="archives.html">Archives</a>
      <button class="theme-btn" id="themeToggle" title="Thème">☀️</button>
      <a href="login.html" class="btn-backoffice">⚙ Back-office</a>
    </nav>
  </header>

  <main class="main-container">
    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Vue d'ensemble des missions en cours.</p>
    </div>

    <div id="dashError" style="display:none;color:var(--p-critical);font-size:13px;margin-bottom:16px;">
      Erreur de chargement des statistiques.
    </div>

    <div id="dashContent">
      <div style="text-align:center;padding:60px;color:var(--text-muted);font-size:13px;opacity:.5">Chargement…</div>
    </div>
  </main>

  <script src="cache.js"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => Dashboard.init(false));</script>
</body>
</html>
