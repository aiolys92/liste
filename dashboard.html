<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Post — Dashboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a030">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"></noscript>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ============================================
       DASHBOARD — Styles
       ============================================ */

    /* KPI Grid */
    .db-kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 1000px) { .db-kpi-grid { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 560px)  { .db-kpi-grid { grid-template-columns: repeat(2,1fr); } }

    .db-kpi {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--r-lg);
      padding: 18px 16px 14px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }
    .db-kpi::before {
      content: '';
      position: absolute; inset: 0 0 auto 0; height: 2px;
      background: var(--kpi-color, var(--gold-dim));
      opacity: 0.6;
    }
    .db-kpi:hover { border-color: var(--border-strong); transform: translateY(-2px); }

    .db-kpi-num {
      font-family: 'Rajdhani', sans-serif;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .db-kpi-key {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .db-kpi-sub {
      font-size: 10px;
      color: var(--text-faint);
      line-height: 1.4;
    }

    /* Rows */
    .db-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .db-row-3 {
      display: grid;
      grid-template-columns: 1fr 1.8fr;
      gap: 14px;
    }
    @media (max-width: 900px) {
      .db-row-2, .db-row-3 { grid-template-columns: 1fr; }
    }

    /* Cards */
    .db-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--r-lg);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .db-card::after {
      content: '';
      position: absolute; inset: 0 0 auto 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
    }

    .db-card-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    /* Donut */
    .db-donut-wrap { display: flex; align-items: center; gap: 18px; }
    .db-donut-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .db-donut-leg {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-base);
    }
    .db-donut-leg-key { flex: 1; }
    .db-donut-leg-val {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--text-muted);
    }

    /* Priorités */
    .db-prio-bars { display: flex; flex-direction: column; gap: 10px; }
    .db-prio-row  { display: flex; align-items: center; gap: 10px; }
    .db-prio-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 5px; }
    .db-prio-label { font-size: 12px; color: var(--text-base); width: 72px; flex-shrink: 0; display: flex; align-items: center; }
    .db-prio-track { flex: 1; height: 8px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }
    .db-prio-count { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 600; width: 22px; text-align: right; flex-shrink: 0; }

    /* Gauge */
    .db-gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .db-gauge-pills { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .db-gauge-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-muted);
      background: var(--bg-raised); border: 1px solid var(--border-dim);
      border-radius: 10px; padding: 3px 9px;
    }
    .db-gauge-pill strong { color: var(--text-bright); font-weight: 700; }

    /* Catégories bulles */
    .db-cat-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      min-height: 120px;
    }

    /* Timeline */
    .db-card-timeline { }

    .db-empty {
      color: var(--text-faint); font-size: 12px;
      text-align: center; padding: 24px 0;
    }
  </style>
</head>
<body>


  <main class="main-container">

    <div class="page-header">
      <div class="page-header-row">
        <div>
          <h1>Dashboard</h1>
          <p>Vue d'ensemble des missions — priorités, états et activité récente.</p>
        </div>
        <button class="btn btn-secondary" style="font-size:12px;padding:7px 14px;"
          onclick="Cache.invalidate('stats');Dashboard.bugs=[];Dashboard.init()">↺ Actualiser</button>
      </div>
    </div>

    <div id="dashContent">
      <div style="text-align:center;padding:80px;color:var(--text-muted);font-size:13px;opacity:.5">
        Chargement…
      </div>
    </div>

  </main>

  <script src="header.js"></script>
  <script src="utils.js"></script>
  <script src="cache.js"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { Header.init('dashboard'); Dashboard.init(false); });</script>
</body>
</html>
