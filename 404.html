<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Post — Page introuvable</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"></noscript>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(200,160,48,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(80,184,255,0.04) 0%, transparent 50%);
    }

    .page-404 {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .glyph-404 {
      position: relative;
      display: inline-block;
      margin-bottom: 32px;
    }

    .glyph-hex {
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      position: relative;
    }

    .glyph-hex svg {
      width: 100%;
      height: 100%;
    }

    .num-404 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 96px;
      font-weight: 700;
      color: var(--text-bright);
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 4px;
      background: linear-gradient(135deg, var(--gold-bright), var(--gold-dim));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .label-404 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .desc-404 {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .links-404 {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Étoiles animées */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--gold-dim);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; transform: scale(1); }
      50%      { opacity: 0.6; transform: scale(1.5); }
    }

    /* Hexagone rotatif */
    @keyframes spin-hex {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .hex-ring {
      animation: spin-hex 12s linear infinite;
      transform-origin: center;
    }
    @keyframes pulse-hex {
      0%,100% { opacity: 0.3; }
      50%      { opacity: 0.7; }
    }
    .hex-inner { animation: pulse-hex 3s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Étoiles de fond -->
  <div class="stars" id="stars"></div>

  <div class="page-404">

    <!-- Hexagone animé -->
    <div class="glyph-hex">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Anneau extérieur rotatif -->
        <g class="hex-ring">
          <polygon points="60,8 105,33 105,87 60,112 15,87 15,33"
            fill="none" stroke="rgba(200,160,48,0.2)" stroke-width="1"
            stroke-dasharray="4 4"/>
          <!-- Points sur les sommets -->
          <circle cx="60"  cy="8"   r="2.5" fill="#c8a030" opacity="0.5"/>
          <circle cx="105" cy="33"  r="2.5" fill="#c8a030" opacity="0.5"/>
          <circle cx="105" cy="87"  r="2.5" fill="#c8a030" opacity="0.5"/>
          <circle cx="60"  cy="112" r="2.5" fill="#c8a030" opacity="0.5"/>
          <circle cx="15"  cy="87"  r="2.5" fill="#c8a030" opacity="0.5"/>
          <circle cx="15"  cy="33"  r="2.5" fill="#c8a030" opacity="0.5"/>
        </g>
        <!-- Hexagone intérieur pulsant -->
        <g class="hex-inner">
          <polygon points="60,22 92,40 92,80 60,98 28,80 28,40"
            fill="rgba(200,160,48,0.06)" stroke="rgba(200,160,48,0.4)" stroke-width="1.5"/>
        </g>
        <!-- Signe central -->
        <text x="60" y="70" text-anchor="middle"
          style="font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;fill:#c8a030;">?</text>
      </svg>
    </div>

    <div class="num-404">404</div>
    <div class="label-404">Mission introuvable</div>
    <div class="desc-404">
      Cette page n'existe pas ou a été déplacée.<br>
      Les ordres viennent d'ici — mais pas cette page.
    </div>

    <div class="links-404">
      <a href="index.html" class="btn btn-primary">← Mission Board</a>
      <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-secondary">Retour</a>
    </div>

  </div>

  <script src="styles.css" onerror="void 0"></script>
  <script>
    // Charger le thème
    const t =     
    // Générer les étoiles
    const container = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.cssText = `
        left: ${Math.random()*100}%;
        top:  ${Math.random()*100}%;
        --dur:   ${2 + Math.random()*4}s;
        --delay: ${Math.random()*4}s;
        width:  ${1 + Math.random()*2}px;
        height: ${1 + Math.random()*2}px;
        background: ${Math.random() > 0.7 ? '#50b8ff' : '#c8a030'};
      `;
      container.appendChild(star);
    }
  </script>
</body>
</html>
