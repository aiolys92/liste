<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Post — Accès sécurisé</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:      #c8a030;
      --gold-dim:  rgba(200,160,48,0.3);
      --gold-glow: rgba(200,160,48,0.12);
      --bg:        #06080d;
      --surface:   #0c0f18;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8e4d8;
      --muted:     rgba(232,228,216,0.45);
      --faint:     rgba(232,228,216,0.2);
      --error:     #ff5252;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,160,48,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,160,48,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }
    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none;
    }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,160,48,0.07) 0%, transparent 70%);
      top: -200px; left: -100px;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(80,184,255,0.04) 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-40px, -60px); } }
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
      pointer-events: none; opacity: 0.5;
    }
    .card {
      position: relative;
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow: 0 0 0 1px rgba(200,160,48,0.06), 0 40px 80px rgba(0,0,0,0.5), 0 0 120px rgba(200,160,48,0.04);
    }
    .card::before {
      content: ''; position: absolute;
      top: 0; left: 15%; right: 15%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .logo-hex {
      width: 40px; height: 40px;
      background: var(--gold-glow);
      border: 1px solid var(--gold-dim);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--gold); position: relative;
    }
    .logo-hex::after {
      content: ''; position: absolute; inset: -4px;
      border-radius: 13px; border: 1px solid var(--gold-dim); opacity: 0.4;
    }
    .logo-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--gold);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 36px;
      padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 20px; background: rgba(255,255,255,0.02);
    }
    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 6px var(--gold);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .field { margin-bottom: 20px; }
    .field-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
      font-family: 'DM Mono', monospace;
    }
    .field-input {
      width: 100%; background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 13px 16px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .field-input::placeholder { color: var(--faint); }
    .field-input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--gold-glow);
      background: rgba(200,160,48,0.03);
    }
    .btn-login {
      width: 100%; margin-top: 8px; padding: 14px;
      background: var(--gold); border: none; border-radius: 8px;
      font-family: 'Rajdhani', sans-serif; font-size: 15px;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: #060400; cursor: pointer; position: relative; overflow: hidden;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-login::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }
    .btn-login:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(6,4,0,0.25); border-top-color: #060400;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,82,82,0.08);
      border: 1px solid rgba(255,82,82,0.2);
      border-radius: 8px; padding: 12px 14px;
      font-size: 13px; color: var(--error);
      margin-bottom: 20px; animation: shake 0.35s ease;
    }
    .error-box.hidden { display: none; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
    }
    .sep { height: 1px; background: var(--border); margin: 28px 0; }
    .footer { display: flex; align-items: center; justify-content: center; }
    .footer a {
      font-size: 12px; color: var(--faint); text-decoration: none;
      letter-spacing: 0.3px; transition: color 0.2s;
    }
    .footer a:hover { color: var(--muted); }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="scanlines"></div>

<div class="card">
  <div class="logo">
    <div class="logo-hex">⬡</div>
    <span class="logo-name">Command Post</span>
  </div>
  <div class="badge">
    <span class="badge-dot"></span>
    Accès sécurisé · Back-office
  </div>

  <div id="loginError" class="error-box hidden">
    <span>⚠</span>
    <span id="loginErrorMsg"></span>
  </div>

  <div class="field">
    <label class="field-label" for="loginEmail">Email</label>
    <input type="email" class="field-input" id="loginEmail"
      placeholder="admin@exemple.com" autocomplete="email" autofocus>
  </div>

  <div class="field">
    <label class="field-label" for="loginPassword">Mot de passe</label>
    <input type="password" class="field-input" id="loginPassword"
      placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    Accéder au back-office
  </button>

  <div class="sep"></div>
  <div class="footer">
    <a href="index.html">← Retour à la vue publique</a>
  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://pmrmeivebuvyynmehyhh.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_oS96m8VAdb2DcfUJby00fw_tpsBXlV-';

  try {
    const s = JSON.parse(localStorage.getItem('sb_session') || '{}');
    if (s.access_token && s.expires_at > Math.floor(Date.now()/1000))
      window.location.href = 'backoffice.html';
  } catch(e) { localStorage.removeItem('sb_session'); }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    if (!email || !password) { showError('Veuillez remplir tous les champs.'); return; }
    btn.innerHTML = '<span class="spinner"></span>Vérification…';
    btn.disabled  = true;
    hideError();
    try {
      const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        showError(data.error_description || data.msg || 'Email ou mot de passe incorrect.');
        return;
      }
      localStorage.setItem('sb_session', JSON.stringify({
        access_token:  data.access_token,
        refresh_token: data.refresh_token,
        expires_at:    Math.floor(Date.now()/1000) + data.expires_in,
      }));
      btn.innerHTML = '✓ Accès accordé';
      btn.style.background = '#70d060';
      setTimeout(() => window.location.href = 'backoffice.html', 400);
    } catch(e) {
      showError('Erreur réseau. Réessayez.');
    } finally {
      if (btn.textContent.includes('Vérification')) {
        btn.innerHTML = 'Accéder au back-office';
        btn.disabled  = false;
      }
    }
  }

  function showError(msg) {
    document.getElementById('loginErrorMsg').textContent = msg;
    const el = document.getElementById('loginError');
    el.classList.remove('hidden');
    el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
    document.getElementById('loginBtn').innerHTML = 'Accéder au back-office';
    document.getElementById('loginBtn').disabled = false;
  }
  function hideError() { document.getElementById('loginError').classList.add('hidden'); }
</script>
</body>
</html>
