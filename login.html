<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Post — Connexion</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <span class="login-logo-icon">⬡</span>
      <span class="login-logo-text">Command Post</span>
    </div>

    <div class="login-subtitle">Accès Back-office</div>

    <div id="loginError" class="login-error hidden"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="admin@exemple.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()" style="width:100%;margin-top:8px;">
      Connexion
    </button>

    <div style="margin-top:16px;text-align:center;">
      <a href="index.html" style="font-size:12px;color:var(--text-faint);">← Retour à la vue publique</a>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL  = 'https://pmrmeivebuvyynmehyhh.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_oS96m8VAdb2DcfUJby00fw_tpsBXlV-';

  // Si déjà connecté, rediriger
  const session = localStorage.getItem('sb_session');
  if (session) {
    try {
      const s = JSON.parse(session);
      if (s.expires_at > Math.floor(Date.now()/1000)) {
        window.location.href = 'backoffice.html';
      }
    } catch(e) { localStorage.removeItem('sb_session'); }
  }

  // Enter pour valider
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    if (!email || !password) {
      showError('Veuillez remplir tous les champs.');
      return;
    }

    btn.textContent = 'Connexion…';
    btn.disabled    = true;
    errEl.classList.add('hidden');

    try {
      const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
        body:    JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        showError(data.error_description || data.msg || 'Email ou mot de passe incorrect.');
        return;
      }

      // Stocker la session
      localStorage.setItem('sb_session', JSON.stringify({
        access_token:  data.access_token,
        refresh_token: data.refresh_token,
        expires_at:    Math.floor(Date.now()/1000) + data.expires_in,
      }));

      window.location.href = 'backoffice.html';

    } catch(e) {
      showError('Erreur réseau. Réessayez.');
    } finally {
      btn.textContent = 'Connexion';
      btn.disabled    = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.classList.remove('hidden');
  }
</script>
</body>
</html>
