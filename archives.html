<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Post — Archives</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c8a030">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"></noscript>
  <link rel="stylesheet" href="styles.css">
</head>
<body>


  <main class="main-container">

    <div class="page-header">
      <h1>Archives</h1>
      <p>Missions archivées — consultables mais non modifiables depuis cette vue.</p>
      <div class="stats-row" id="statsRow"></div>
    </div>

    <div id="errorBanner" style="display:none;background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);border-radius:var(--r-md);color:var(--p-critical);padding:12px 18px;margin-bottom:16px;font-size:13px;"></div>

    <div class="filters-bar">
      <div class="search-wrapper" style="margin-left:0;">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher dans les archives…" style="width:280px;">
      </div>
      <span class="filter-count" id="filterCount"></span>
    </div>

    <div class="bugs-table-wrapper">
      <table class="bugs-table">
        <thead>
          <tr>
            <th class="col-type"        data-sort="type">Type <span class="sort-arrow">↕</span></th>
            <th class="col-category"    data-sort="category">Catégorie <span class="sort-arrow">↕</span></th>
            <th class="col-id"          data-sort="id">ID <span class="sort-arrow">↕</span></th>
            <th class="col-priority"    data-sort="priority">Priorité <span class="sort-arrow">↕</span></th>
            <th class="col-description">Description</th>
            <th class="col-state"       data-sort="state">État <span class="sort-arrow">↕</span></th>
            <th class="col-date"        data-sort="date">Arrivé le <span class="sort-arrow">↕</span></th>
            <th class="col-comments"    style="width:54px;text-align:center;">💬</th>
          </tr>
        </thead>
        <tbody id="bugsTableBody">
          <tr id="loadingRow">
            <td colspan="8" style="text-align:center;padding:48px;color:var(--text-muted);font-size:13px;"><span style="opacity:.5">Chargement…</span></td>
          </tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>

  </main>

  <!-- MODALE COMMENTAIRES (lecture seule) -->
  <div class="modal-overlay hidden" id="commentsModal">
    <div class="modal" style="max-width:560px;">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="commentsModalTitle"></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:3px;font-family:'DM Mono',monospace;" id="commentsBugId"></div>
        </div>
        <button class="modal-close" onclick="Archives.closeComments()">×</button>
      </div>
      <div class="modal-body" style="padding:0;">
        <div id="commentsList" style="max-height:400px;overflow-y:auto;padding:16px 24px;"></div>
      </div>
    </div>
  </div>


  <!-- TOAST -->
  <div class="notification hidden" id="archNotif"></div>

  <!-- MODALE ACTIONS ARCHIVES -->
  <div class="modal-overlay hidden" id="archActionOverlay">
    <div class="modal" style="max-width:320px;">
      <div class="modal-header">
        <div style="flex:1;min-width:0;">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:5px;" id="archActionSubtitle"></div>
          <div class="modal-title" style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="archActionTitle"></div>
        </div>
        <button class="modal-close" onclick="Archives.closeActionModal()">×</button>
      </div>
      <div class="modal-body" style="padding:8px;">

        <div class="action-modal-item" onclick="Archives.doAction('restore')">
          <span class="action-modal-icon">♻️</span>
          <div>
            <div class="action-modal-label">Restaurer</div>
            <div class="action-modal-desc">Remettre sur le Mission Board</div>
          </div>
        </div>

        <div class="action-modal-sep"></div>

        <div class="action-modal-item danger" onclick="Archives.doAction('delete')">
          <span class="action-modal-icon">🗑️</span>
          <div>
            <div class="action-modal-label">Supprimer</div>
            <div class="action-modal-desc">Suppression définitive</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="header.js"></script>
  <script src="utils.js"></script>
  <script src="cache.js"></script>
  <!-- OVERLAY DÉTAIL -->
  <div class="modal-overlay hidden" id="detailOverlay">
    <div id="detailModal"></div>
  </div>

  <script src="supabase.js"></script>
  <script>
  const Archives = {
    bugs: [],
    search: '',
    currentPage: 1,
    itemsPerPage: 10,
    sortField: 'date',
    sortDir: 'desc',

    isAdmin: false,

  async init() {
    // Vérifier si admin connecté
    this.isAdmin = sessionStorage.getItem('bo_auth') === 'ok';
    if (this.isAdmin) {
      const th = document.getElementById('thActions');
      if (th) th.textContent = 'Actions';
    }
      document.getElementById('loadingRow').style.display = '';
      try {
        this.bugs = await DB.fetchArchived();
      } catch(e) {
        document.getElementById('errorBanner').textContent = 'Erreur de chargement.';
        document.getElementById('errorBanner').style.display = 'block';
      }
      document.getElementById('loadingRow').style.display = 'none';
      document.getElementById('statsRow').innerHTML = `<div class="stat-chip"><strong>${this.bugs.length}</strong> mission${this.bugs.length>1?'s':''} archivée${this.bugs.length>1?'s':''}</div>`;
      document.getElementById('searchInput').addEventListener('input', e => { this.search=e.target.value.toLowerCase(); this.currentPage=1; this.render(); });
      document.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          const f=th.dataset.sort;
          if(this.sortField===f)this.sortDir=this.sortDir==='asc'?'desc':'asc';
          else{this.sortField=f;this.sortDir='asc';}
          this.render();
        });
      });
      this.render();
    },

    getFiltered() {
      if (!this.search) return this.bugs;
      return this.bugs.filter(b =>
        b.title?.toLowerCase().includes(this.search) ||
        b.description?.toLowerCase().includes(this.search) ||
        b.id?.toLowerCase().includes(this.search)
      );
    },

    getSorted(list) {
      const po={'Critique':0,'Haute':1,'Moyenne':2,'Basse':3,'Mineure':4};
      return [...list].sort((a,b)=>{
        let va=a[this.sortField],vb=b[this.sortField];
        if(this.sortField==='priority'){va=po[va]??99;vb=po[vb]??99;}
        if(va<vb)return this.sortDir==='asc'?-1:1;
        if(va>vb)return this.sortDir==='asc'?1:-1;
        return 0;
      });
    },

    render() {
      const filtered=this.getSorted(this.getFiltered());
      const total=filtered.length;
      const totalPages=Math.max(1,Math.ceil(total/this.itemsPerPage));
      this.currentPage=Math.min(this.currentPage,totalPages);
      const start=(this.currentPage-1)*this.itemsPerPage;
      const page=filtered.slice(start,start+this.itemsPerPage);
      document.getElementById('filterCount').textContent=`${total} résultat${total>1?'s':''}`;
      document.querySelectorAll('[data-sort]').forEach(th=>{
        th.classList.toggle('sorted',th.dataset.sort===this.sortField);
        const arrow=th.querySelector('.sort-arrow');
        if(arrow)arrow.textContent=th.dataset.sort===this.sortField?(this.sortDir==='asc'?'↑':'↓'):'↕';
      });
      const tbody=document.getElementById('bugsTableBody');
      tbody.innerHTML=page.length===0
        ?`<tr><td colspan="8"><div class="empty-state"><span class="empty-icon">📦</span><p>Aucune mission archivée ne correspond à la recherche.</p></div></td></tr>`
        :page.map(b=>this.renderRow(b)).join('');
      this.renderPagination(total,totalPages);
    },

    renderRow(b) {
      const ts=this.toSlug,d=this.esc.bind(this);
      return `<tr style="opacity:.75;cursor:pointer;" onclick="Archives.openDetail('${d(b.id)}')">
        <td class="col-type"><span class="badge badge-type-${ts(b.type)}"><span class="badge-dot"></span>${d(b.type)}</span></td>
        <td class="col-category"><span class="badge badge-cat-${ts(b.category)}"><span class="badge-dot"></span>${d(b.category)}</span></td>
        <td class="col-id"><span class="bug-id">${d(b.id)}</span></td>
        <td class="col-priority"><span class="badge badge-prio-${ts(b.priority)}"><span class="badge-dot"></span>${d(b.priority)}</span></td>
        <td class="col-description"><div class="bug-desc"><div class="bug-desc-title">${d(b.title)}</div><div class="bug-desc-detail">${d(b.description)}</div></div></td>
        <td class="col-state"><span class="badge badge-state-${ts(b.state)}"><span class="badge-dot"></span>${d(b.state)}</span></td>
        <td class="col-date"><div class="bug-date"><div class="date-main">${this.fmtDate(b.date)}</div></div></td>
        <td class="col-comments" style="text-align:center;">
          <button class="comments-btn" onclick="event.stopPropagation();Archives.openComments('${d(b.id)}')" title="Commentaires">💬</button>
        </td>
        ${Archives.isAdmin ? `<td class="col-actions">
          <button class="action-menu-btn" onclick="event.stopPropagation();Archives.openActionModal('${d(b.id)}')" title="Actions">···</button>
        </td>` : '<td></td>'}
      </tr>`;
    },

    renderPagination(total,totalPages) {
      const el=document.getElementById('pagination');
      const s=(this.currentPage-1)*this.itemsPerPage+1;
      const e=Math.min(this.currentPage*this.itemsPerPage,total);
      let btns=`<button class="page-btn" onclick="Archives.goPage(${this.currentPage-1})" ${this.currentPage===1?'disabled':''}>‹</button>`;
      for(let i=1;i<=totalPages;i++){
        if(totalPages>7&&Math.abs(i-this.currentPage)>2&&i!==1&&i!==totalPages){
          if(i===2||i===totalPages-1)btns+=`<span class="page-btn" style="cursor:default;border:none;opacity:.4">…</span>`;
          continue;
        }
        btns+=`<button class="page-btn ${i===this.currentPage?'active':''}" onclick="Archives.goPage(${i})">${i}</button>`;
      }
      btns+=`<button class="page-btn" onclick="Archives.goPage(${this.currentPage+1})" ${this.currentPage===totalPages?'disabled':''}>›</button>`;
      el.innerHTML=`<span class="pagination-info">Affichage ${total===0?0:s}–${e} sur ${total}</span><div class="pagination-controls">${btns}</div>`;
    },

    goPage(p) {
      const t=Math.max(1,Math.ceil(this.getFiltered().length/this.itemsPerPage));
      if(p<1||p>t)return;
      this.currentPage=p; this.render();
      window.scrollTo({top:0,behavior:'smooth'});
    },

    async openComments(bugId) {
      const bug=this.bugs.find(b=>b.id===bugId); if(!bug)return;
      document.getElementById('commentsModalTitle').textContent=bug.title;
      document.getElementById('commentsBugId').textContent=bugId;
      document.getElementById('commentsList').innerHTML=`<div class="comments-loading">Chargement…</div>`;
      document.getElementById('commentsModal').classList.remove('hidden');
      try {
        const comments=await DB.fetchComments(bugId);
        const el=document.getElementById('commentsList');
        if(!comments.length){el.innerHTML=`<div class="comments-empty">Aucun commentaire.</div>`;return;}
        el.innerHTML=comments.map(c=>`
          <div class="comment-item">
            <div class="comment-header">
              <span class="comment-author">${this.esc(c.author)}</span>
              <span class="comment-date">${this.fmtDatetime(c.created_at)}</span>
            </div>
            <div class="comment-content">${this.esc(c.content)}</div>
          </div>`).join('');
      } catch(e) { document.getElementById('commentsList').innerHTML=`<div class="comments-error">Erreur.</div>`; }
    },

    openActionModal(id) {
      const bug = this.bugs.find(b => b.id === id); if(!bug) return;
      const d = this.esc.bind(this);
      const ts = this.toSlug;
      document.getElementById('archActionSubtitle').innerHTML = '<span class="bug-id">' + d(bug.id) + '</span>';
      document.getElementById('archActionTitle').textContent = bug.title;
      document.getElementById('archActionOverlay').dataset.bugId = id;
      document.getElementById('archActionOverlay').classList.remove('hidden');
    },

    closeActionModal() { document.getElementById('archActionOverlay').classList.add('hidden'); },

    async doAction(action) {
      const id = document.getElementById('archActionOverlay').dataset.bugId;
      this.closeActionModal();
      if (action === 'restore') await this.restore(id);
      if (action === 'delete')  await this.deletePermanent(id);
    },

    async restore(id) {
      try {
        await DB.restoreBug(id);
        this.bugs = this.bugs.filter(b => b.id !== id);
        document.getElementById('statsRow').innerHTML = `<div class="stat-chip"><strong>${this.bugs.length}</strong> mission${this.bugs.length>1?'s':''} archivée${this.bugs.length>1?'s':''}</div>`;
        this.render();
        this.showNotif('✓ Mission restaurée sur le Mission Board');
      } catch(e) { this.showNotif('Erreur : ' + e.message, true); }
    },

    async deletePermanent(id) {
      if (!confirm('Supprimer définitivement cette mission ? Cette action est irréversible.')) return;
      try {
        await DB.deleteBug(id);
        this.bugs = this.bugs.filter(b => b.id !== id);
        document.getElementById('statsRow').innerHTML = `<div class="stat-chip"><strong>${this.bugs.length}</strong> mission${this.bugs.length>1?'s':''} archivée${this.bugs.length>1?'s':''}</div>`;
        this.render();
        this.showNotif('✓ Mission supprimée définitivement');
      } catch(e) { this.showNotif('Erreur : ' + e.message, true); }
    },

    showNotif(msg, isError=false) {
      let el = document.getElementById('archNotif');
      if (!el) { el=document.createElement('div'); el.id='archNotif'; el.className='notification'; document.body.appendChild(el); }
      el.textContent=msg; el.classList.toggle('error',isError); el.classList.remove('hidden');
      clearTimeout(this._notifTimer);
      this._notifTimer=setTimeout(()=>el.classList.add('hidden'),3200);
    },

    openDetail(id) {
      const bug = this.bugs.find(b => b.id === id); if (!bug) return;
      const d  = this.esc.bind(this);
      const ts = this.toSlug;
      document.getElementById('detailModal').innerHTML = `
        <div class="modal detail-modal">
          <div class="detail-header-band">
            <div class="detail-id-row">
              <span class="bug-id" onclick="event.stopPropagation();copyId('${d(bug.id)}',this)" title="Copier">${d(bug.id)}</span>
              <span class="badge badge-type-${ts(bug.type)}">${d(bug.type)}</span>
              <span class="badge badge-cat-${ts(bug.category)}">${d(bug.category)}</span>
              <span class="archived-banner" style="font-size:10px;padding:2px 8px;">📦 Archivée</span>
            </div>
            <div class="detail-title">${d(bug.title)}</div>
            <div class="detail-badges">
              <span class="badge badge-prio-${ts(bug.priority)}"><span class="badge-dot"></span>${d(bug.priority)}</span>
              <span class="badge badge-state-${ts(bug.state)}"><span class="badge-dot"></span>${d(bug.state)}</span>
            </div>
          </div>
          <div class="detail-body">
            <div>
              <div class="detail-section-label">Description</div>
              <div class="detail-description">${d(bug.description)}</div>
            </div>
            <div class="detail-grid">
              <div class="detail-field"><div class="detail-section-label">Assigné à</div>
                <div class="detail-field-value">${d(bug.assignee)||'<span style="color:var(--text-faint)">Non assigné</span>'}</div></div>
              <div class="detail-field"><div class="detail-section-label">Date de début</div>
                <div class="detail-field-value">${bug.start_date ? this.fmtDate(bug.start_date) : '<span style="color:var(--text-faint)">—</span>'}</div></div>
              <div class="detail-field"><div class="detail-section-label">Date de création</div>
                <div class="detail-field-value">${this.fmtDate(bug.date)}</div></div>
              <div class="detail-field"><div class="detail-section-label">Échéance</div>
                <div class="detail-field-value">${bug.due_date ? this.fmtDate(bug.due_date) : '<span style="color:var(--text-faint)">—</span>'}</div></div>
              <div class="detail-field"><div class="detail-section-label">Priorité</div>
                <div class="detail-field-value"><span class="badge badge-prio-${ts(bug.priority)}"><span class="badge-dot"></span>${d(bug.priority)}</span></div></div>
            </div>
            ${bug.ref_url ? `<div><div class="detail-section-label">Lien de référence</div>
              <a href="${d(bug.ref_url)}" target="_blank" onclick="event.stopPropagation()"
                style="font-size:13px;color:var(--blue-bright);word-break:break-all;">${d(bug.ref_url)}</a></div>` : ''}
          </div>
          <div class="detail-footer">
            <button class="btn btn-secondary" onclick="Archives.closeDetail()">Fermer</button>
            <button class="btn btn-secondary" onclick="Archives.closeDetail();Archives.openComments('${d(bug.id)}')">💬 Commentaires</button>
            ${this.isAdmin ? `<button class="btn btn-primary" onclick="Archives.closeDetail();Archives.openActionModal('${d(bug.id)}')">⚡ Actions</button>` : ''}
          </div>
        </div>`;
      document.getElementById('detailOverlay').classList.remove('hidden');
    },

    closeDetail() {
      document.getElementById('detailOverlay').classList.add('hidden');
    },

    closeComments() { document.getElementById('commentsModal').classList.add('hidden'); },
    toSlug(str) { return String(str).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); },
    fmtDate(d)  { if(!d)return'—'; return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); },
    fmtDatetime(d) { if(!d)return'—'; return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); },
    esc(str)    { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  };
  document.addEventListener('DOMContentLoaded',()=>{Header.init('archives');Archives.init();});
  document.getElementById('archActionOverlay')?.addEventListener('click',e=>{
    if(e.target===document.getElementById('archActionOverlay'))Archives.closeActionModal();});
  document.getElementById('detailOverlay')?.addEventListener('click',e=>{if(e.target===document.getElementById('detailOverlay'))Archives.closeDetail();});
  </script>
</body>
</html>
